<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LHT Check-in Semanal</title>
  <style>
    :root {
      --bg: #f3f8ff;
      --ink: #14213d;
      --accent: #0d6efd;
      --card: #ffffff;
      --line: #d9e4f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(180deg, #eef5ff 0%, #f8fbff 100%);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .wrap {
      width: min(780px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(20, 33, 61, 0.08);
    }
    h1 { margin-top: 0; }
    .summary {
      background: #f4f8ff;
      border: 1px solid #d3e2ff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .q {
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--line);
    }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid #c6d7f3;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
    }
    button {
      margin-top: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    #status { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Check-in semanal</h1>
    <div id="loading">A carregar...</div>
    <form id="form" hidden>
      <p id="week"></p>
      <div id="summary" class="summary"></div>
      <div id="questions"></div>
      <div class="q">
        <label for="extra">Algo fora do contexto de treino que devamos considerar?</label>
        <textarea id="extra" name="extra"></textarea>
      </div>
      <button type="submit">Enviar respostas</button>
      <div id="status"></div>
    </form>
  </main>

  <script>
    const loading = document.getElementById("loading");
    const form = document.getElementById("form");
    const week = document.getElementById("week");
    const summary = document.getElementById("summary");
    const questionsNode = document.getElementById("questions");
    const statusNode = document.getElementById("status");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    let questions = [];

    async function loadCheckin() {
      if (!token) {
        loading.textContent = "Token em falta.";
        return;
      }

      const response = await fetch(`/.netlify/functions/checkin?token=${encodeURIComponent(token)}`);
      const data = await response.json();
      if (!response.ok) {
        loading.textContent = data.error || "Erro ao carregar check-in.";
        return;
      }

      questions = data.questions || [];
      week.textContent = `Semana com inicio em ${data.weekStart}`;
      summary.textContent = data.summary || "Sem resumo disponivel.";

      questionsNode.innerHTML = "";
      questions.forEach((q, index) => {
        const block = document.createElement("div");
        block.className = "q";
        block.innerHTML = `<label for="q_${index}">${q}</label><textarea id="q_${index}" name="q_${index}" required></textarea>`;
        questionsNode.appendChild(block);
      });

      loading.hidden = true;
      form.hidden = false;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const answers = {};
      questions.forEach((_, index) => {
        answers[`q_${index + 1}`] = document.getElementById(`q_${index}`).value.trim();
      });
      answers.extra = document.getElementById("extra").value.trim();

      statusNode.textContent = "A enviar...";
      const response = await fetch("/.netlify/functions/submit-response", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, answers })
      });
      const data = await response.json();

      if (!response.ok) {
        statusNode.textContent = data.error || "Erro ao enviar.";
        return;
      }

      statusNode.textContent = "Respostas enviadas com sucesso. Obrigado.";
      form.querySelector("button").disabled = true;
    });

    loadCheckin();
  </script>
</body>
</html>
