[build]
  publish = "."
  command = "npm run build"

[dev]
  port = 8888
  publish = "."
  autoLaunch = false
  framework = "#static"

[functions]
  directory = "netlify/functions"


# Friendly URLs
[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/artigo"
  to = "/artigo.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/calendario"
  to = "/calendario.html"
  status = 301

[[redirects]]
  from = "/programas"
  to = "/programas.html"
  status = 301

[[redirects]]
  from = "/programas/"
  to = "/programas.html"
  status = 301

[[redirects]]
  from = "/coach"
  to = "/coach/"
  status = 301

[[redirects]]
  from = "/check-in"
  to = "/check-in/"
  status = 301

[[redirects]]
  from = "/planocorrida/coach"
  to = "/coach/"
  status = 301

[[redirects]]
  from = "/planocorrida/coach/forca"
  to = "/coach/"
  status = 301

[[redirects]]
  from = "/atleta"
  to = "/planocorrida/index.html"
  status = 200

[[redirects]]
  from = "/atleta/*"
  to = "/planocorrida/index.html"
  status = 200

[[redirects]]
  from = "/planocorrida"
  to = "/planocorrida/index.html"
  status = 200

[[redirects]]
  from = "/planocorrida/*"
  to = "/planocorrida/index.html"
  status = 200

# Ensure posts index is not captured by the slug rewrite
[[redirects]]
  from = "/blog/posts.json"
  to = "/blog/posts.json"
  status = 200

# Redirect old blog route to dynamic article page
[[redirects]]
  from = "/blog/:slug"
  to = "/artigo.html?post=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/blog/:slug/"
  to = "/artigo.html?post=:slug"
  status = 200
  force = true
# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com https://www.googletagmanager.com https://connect.facebook.net; script-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://buy.stripe.com https://generativelanguage.googleapis.com https://graph.facebook.com https://www.facebook.com https://*.googleapis.com https://www.google-analytics.com https://region1.google-analytics.com https://cdn.jsdelivr.net https://unpkg.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://www.youtube.com https://player.vimeo.com https://calendar.google.com;"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Override JS caching to ensure latest code loads
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "no-cache"

# Ensure posts index JSON is fresh (CMS updates)
[[headers]]
  for = "/blog/posts.json"
  [headers.values]
    Cache-Control = "no-cache"
